<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #E30613, #9f0110);
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
        }
        button {
            background: white;
            color: #E30613;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            margin-top: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ Super Admin Dashboard</h1>
        <p>You have successfully logged in as Super Admin!</p>
        <p>Session ID: <span id="sessionId"></span></p>
        <button onclick="logout()">Logout</button>
    </div>
    <script>
        // Check if logged in
        const isLoggedIn = sessionStorage.getItem('qless_logged_in');
        const userRole = sessionStorage.getItem('qless_user_role');
        
        if (!isLoggedIn || userRole !== 'super_administrator') {
            window.location.href = 'login.html';
        }
        
        document.getElementById('sessionId').innerText = sessionStorage.getItem('qless_username') || 'Superadmin';
        
        function logout() {
            sessionStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
