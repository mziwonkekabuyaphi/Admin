<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Rands Venue OS | Secure Login Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Montserrat', 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #0a0c0f 0%, #1a1e24 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .login-container {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    animation: fadeIn 0.8s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .login-card {
    background: rgba(255, 255, 255, 0.98);
    backdrop-filter: blur(10px);
    border-radius: 32px;
    padding: 48px 40px;
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(227, 6, 19, 0.1);
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: linear-gradient(90deg, #E30613, #ff4d5a, #E30613);
    background-size: 200% 100%;
    animation: gradientShift 3s ease infinite;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .logo-area {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo-icon {
    width: 80px;
    height: 80px;
    background: #fff;
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
    overflow: hidden;
    transition: transform 0.3s ease;
  }

  .logo-icon:hover {
    transform: rotate(5deg) scale(1.05);
  }

  .logo-icon i {
    font-size: 48px;
    color: #E30613;
  }

  .logo-area h1 {
    font-size: 32px;
    font-weight: 800;
    color: #222;
    letter-spacing: -0.5px;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .logo-area h1 span {
    color: #E30613;
    font-weight: 900;
    position: relative;
    display: inline-block;
  }

  .logo-area h1 span::after {
    content: '';
    position: absolute;
    bottom: 4px;
    left: 0;
    width: 100%;
    height: 8px;
    background: rgba(227, 6, 19, 0.1);
    border-radius: 4px;
    z-index: -1;
  }

  .logo-area .subtitle {
    color: #888;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .user-type-selector {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    background: #f5f5f5;
    padding: 6px;
    border-radius: 60px;
  }

  .user-type-btn {
    flex: 1;
    padding: 14px 24px;
    border: none;
    background: transparent;
    border-radius: 60px;
    font-size: 16px;
    font-weight: 600;
    color: #666;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .user-type-btn i {
    font-size: 18px;
  }

  .user-type-btn.active {
    background: white;
    color: #E30613;
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
  }

  .user-type-btn.superadmin.active {
    background: linear-gradient(135deg, #8B0000 0%, #E30613 100%);
    color: white;
  }

  .user-type-btn.admin.active {
    background: linear-gradient(135deg, #E30613 0%, #b3000c 100%);
    color: white;
  }

  .user-type-btn.staff.active {
    background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
    color: white;
  }

  .form-group {
    margin-bottom: 24px;
    position: relative;
  }

  .form-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
    font-weight: 600;
    color: #444;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-wrapper i:first-child {
    position: absolute;
    left: 16px;
    color: #999;
    font-size: 18px;
    transition: color 0.3s ease;
  }

  .input-wrapper input {
    width: 100%;
    padding: 16px 16px 16px 50px;
    border: 2px solid #e0e0e0;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 500;
    transition: all 0.3s ease;
    background: white;
    font-family: inherit;
  }

  .input-wrapper input:focus {
    outline: none;
    border-color: #E30613;
    box-shadow: 0 0 0 4px rgba(227, 6, 19, 0.1);
  }

  .input-wrapper input:focus + i:first-child {
    color: #E30613;
  }

  /* Green success acknowledgment for valid credentials */
  .input-wrapper.valid-username i:first-child {
    color: #10b981 !important;
  }
  
  .input-wrapper.valid-password i:first-child {
    color: #10b981 !important;
  }
  
  .field-success-icon {
    position: absolute;
    right: 16px;
    color: #10b981;
    font-size: 18px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  
  .input-wrapper.valid-username .field-success-icon,
  .input-wrapper.valid-password .field-success-icon {
    opacity: 1;
  }
  
  .toggle-password {
    position: absolute;
    right: 16px;
    left: auto !important;
    cursor: pointer;
    color: #999;
    z-index: 2;
  }

  .toggle-password:hover {
    color: #E30613;
  }

  .password-hint {
    margin-top: 8px;
    font-size: 12px;
    color: #999;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .login-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #E30613 0%, #b3000c 100%);
    border: none;
    border-radius: 60px;
    color: white;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .login-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transition: left 0.5s ease;
  }

  .login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 30px rgba(227, 6, 19, 0.3);
  }

  .login-btn:hover::before {
    left: 100%;
  }

  .login-btn.loading {
    pointer-events: none;
    opacity: 0.8;
  }

  .login-btn.loading i {
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .security-note {
    text-align: center;
    color: #999;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding-top: 16px;
    border-top: 1px solid #eee;
  }

  .error-message {
    background: #ffebee;
    border-left: 4px solid #E30613;
    padding: 12px 16px;
    border-radius: 12px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: shake 0.5s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }

  .error-message i {
    color: #E30613;
    font-size: 20px;
  }

  .error-message span {
    color: #c62828;
    font-size: 14px;
    font-weight: 500;
    flex: 1;
  }
  
  /* Success acknowledgment message that appears near fields */
  .inline-success {
    font-size: 11px;
    font-weight: 600;
    color: #10b981;
    margin-top: 5px;
    display: flex;
    align-items: center;
    gap: 5px;
    animation: slideUp 0.3s ease;
  }
  
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hidden {
    display: none !important;
  }

  @media (max-width: 480px) {
    .login-card {
      padding: 32px 24px;
    }
    .logo-area h1 {
      font-size: 24px;
    }
    .user-type-btn {
      padding: 12px 16px;
      font-size: 14px;
    }
  }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="logo-area">
      <div class="logo-icon">
        <i class="fas fa-building"></i>
      </div>
      <h1><span>Rands</span> Venue Management OS</h1>
      <div class="subtitle">Enterprise Access Portal</div>
    </div>

    <div class="user-type-selector">
      <button class="user-type-btn superadmin" id="superadminTypeBtn"><i class="fas fa-crown"></i> Super Admin</button>
      <button class="user-type-btn admin" id="adminTypeBtn"><i class="fas fa-user-tie"></i> Tenant Admin</button>
      <button class="user-type-btn staff" id="staffTypeBtn"><i class="fas fa-users"></i> Staff</button>
    </div>

    <div id="errorMessage" class="error-message hidden">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorText">Invalid username or password</span>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label><i class="fas fa-user-circle" style="margin-right: 6px;"></i> Username</label>
        <div class="input-wrapper" id="usernameWrapper">
          <i class="fas fa-user"></i>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="off">
          <i class="fas fa-check-circle field-success-icon"></i>
        </div>
        <div id="usernameSuccessMsg" class="inline-success hidden">
          <i class="fas fa-check-circle"></i> <span>✓ Username verified</span>
        </div>
        <div class="password-hint" id="usernameHint">
          <i class="fas fa-info-circle"></i>
          <span>Super Admin: "Superadmin" | Tenant Admin: "Admin" | Staff: "Staff"</span>
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-lock" style="margin-right: 6px;"></i> Password</label>
        <div class="input-wrapper" id="passwordWrapper">
          <i class="fas fa-key"></i>
          <input type="password" id="password" placeholder="Enter your password">
          <i class="fas fa-eye toggle-password" id="togglePassword"></i>
          <i class="fas fa-check-circle field-success-icon"></i>
        </div>
        <div id="passwordSuccessMsg" class="inline-success hidden">
          <i class="fas fa-check-circle"></i> <span>✓ Password correct</span>
        </div>
        <div class="password-hint">
          <i class="fas fa-lock"></i>
          <span>Password: "randscapetown" for all roles</span>
        </div>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">
        <span>Access Dashboard</span>
        <i class="fas fa-arrow-right"></i>
      </button>

      <div class="security-note">
        <i class="fas fa-shield-alt"></i>
        <span>Secured by Rands Enterprise Security</span>
      </div>
    </form>
  </div>
</div>

<script>
  (function() {
    // DOM Elements
    const superadminTypeBtn = document.getElementById('superadminTypeBtn');
    const adminTypeBtn = document.getElementById('adminTypeBtn');
    const staffTypeBtn = document.getElementById('staffTypeBtn');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const errorMessageDiv = document.getElementById('errorMessage');
    const errorTextSpan = document.getElementById('errorText');
    const togglePassword = document.getElementById('togglePassword');
    const usernameWrapper = document.getElementById('usernameWrapper');
    const passwordWrapper = document.getElementById('passwordWrapper');
    const usernameSuccessMsg = document.getElementById('usernameSuccessMsg');
    const passwordSuccessMsg = document.getElementById('passwordSuccessMsg');

    let currentUserType = 'superadmin';

    // ============================================================
    // THREE CREDENTIALS:
    // 1. Super Admin: username "Superadmin", password "randscapetown" -> redirects to superadmin.html
    // 2. Tenant Admin: username "Admin", password "randscapetown" -> redirects to admin.html
    // 3. Staff: username "Staff", password "randscapetown" -> redirects to staff.html
    // ============================================================
    const VALID_CREDENTIALS = {
      superadmin: {
        username: "Superadmin",
        password: "randscapetown",
        role: "super_administrator",
        redirectUrl: "superadmin.html",
        displayName: "Super Administrator",
        icon: "crown"
      },
      admin: {
        username: "Admin",
        password: "randscapetown",
        role: "tenant_administrator",
        redirectUrl: "admin.html",
        displayName: "Tenant Administrator",
        icon: "user-tie"
      },
      staff: {
        username: "Staff",
        password: "randscapetown",
        role: "staff",
        redirectUrl: "staff.html",
        displayName: "Staff Member",
        icon: "users"
      }
    };

    // Helper: Update green acknowledgment for username field
    function updateUsernameAcknowledgment() {
      const enteredUsername = usernameInput.value.trim();
      const expectedUsername = VALID_CREDENTIALS[currentUserType]?.username;
      const isValid = (enteredUsername === expectedUsername);
      
      if (enteredUsername.length > 0) {
        if (isValid) {
          usernameWrapper.classList.add('valid-username');
          usernameSuccessMsg.classList.remove('hidden');
        } else {
          usernameWrapper.classList.remove('valid-username');
          usernameSuccessMsg.classList.add('hidden');
        }
      } else {
        usernameWrapper.classList.remove('valid-username');
        usernameSuccessMsg.classList.add('hidden');
      }
    }
    
    // Helper: Update green acknowledgment for password field
    function updatePasswordAcknowledgment() {
      const enteredPassword = passwordInput.value;
      const expectedPassword = VALID_CREDENTIALS[currentUserType]?.password;
      const isValid = (enteredPassword === expectedPassword);
      
      if (enteredPassword.length > 0) {
        if (isValid) {
          passwordWrapper.classList.add('valid-password');
          passwordSuccessMsg.classList.remove('hidden');
        } else {
          passwordWrapper.classList.remove('valid-password');
          passwordSuccessMsg.classList.add('hidden');
        }
      } else {
        passwordWrapper.classList.remove('valid-password');
        passwordSuccessMsg.classList.add('hidden');
      }
    }
    
    // Real-time validation for username
    if (usernameInput) {
      usernameInput.addEventListener('input', function() {
        updateUsernameAcknowledgment();
        if (!errorMessageDiv.classList.contains('hidden')) {
          errorMessageDiv.classList.add('hidden');
        }
      });
    }
    
    // Real-time validation for password
    if (passwordInput) {
      passwordInput.addEventListener('input', function() {
        updatePasswordAcknowledgment();
        if (!errorMessageDiv.classList.contains('hidden')) {
          errorMessageDiv.classList.add('hidden');
        }
      });
    }
    
    // Toggle password visibility
    if (togglePassword) {
      togglePassword.addEventListener('click', function() {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.classList.toggle('fa-eye-slash');
      });
    }

    // Set active user type button and reset green indicators
    function setActiveUserType(type) {
      currentUserType = type;
      
      // Update button active states
      superadminTypeBtn.classList.remove('active');
      adminTypeBtn.classList.remove('active');
      staffTypeBtn.classList.remove('active');
      
      if (type === 'superadmin') {
        superadminTypeBtn.classList.add('active');
        const hintSpan = document.querySelector('#usernameHint span');
        if (hintSpan) hintSpan.textContent = 'Super Admin username: "Superadmin" | Tenant Admin: "Admin" | Staff: "Staff"';
      } else if (type === 'admin') {
        adminTypeBtn.classList.add('active');
        const hintSpan = document.querySelector('#usernameHint span');
        if (hintSpan) hintSpan.textContent = 'Tenant Admin username: "Admin" | Super Admin: "Superadmin" | Staff: "Staff"';
      } else {
        staffTypeBtn.classList.add('active');
        const hintSpan = document.querySelector('#usernameHint span');
        if (hintSpan) hintSpan.textContent = 'Staff username: "Staff" | Super Admin: "Superadmin" | Tenant Admin: "Admin"';
      }
      
      // Clear inputs and reset green indicators
      usernameInput.value = '';
      passwordInput.value = '';
      usernameWrapper.classList.remove('valid-username');
      passwordWrapper.classList.remove('valid-password');
      usernameSuccessMsg.classList.add('hidden');
      passwordSuccessMsg.classList.add('hidden');
      errorMessageDiv.classList.add('hidden');
      usernameInput.focus();
    }

    // Super Admin button click
    if (superadminTypeBtn) {
      superadminTypeBtn.addEventListener('click', () => setActiveUserType('superadmin'));
    }

    // Tenant Admin button click
    if (adminTypeBtn) {
      adminTypeBtn.addEventListener('click', () => setActiveUserType('admin'));
    }

    // Staff button click
    if (staffTypeBtn) {
      staffTypeBtn.addEventListener('click', () => setActiveUserType('staff'));
    }

    function showError(message) {
      errorTextSpan.textContent = message;
      errorMessageDiv.classList.remove('hidden');
      setTimeout(() => {
        errorMessageDiv.classList.add('hidden');
      }, 5000);
    }

    // Authenticate and redirect
    async function authenticateAndRedirect(username, password, userType) {
      await new Promise(resolve => setTimeout(resolve, 500)); // smooth UX
      const cred = VALID_CREDENTIALS[userType];
      if (!cred) {
        return { success: false, message: 'Invalid user role selected.' };
      }
      
      const usernameMatch = (username === cred.username);
      const passwordMatch = (password === cred.password);
      
      if (usernameMatch && passwordMatch) {
        return { 
          success: true, 
          redirectUrl: cred.redirectUrl, 
          role: cred.role,
          displayName: cred.displayName,
          username: username
        };
      } else {
        let hint = '';
        if (userType === 'superadmin') {
          hint = 'Super Admin credentials: username "Superadmin", password "randscapetown"';
        } else if (userType === 'admin') {
          hint = 'Tenant Admin credentials: username "Admin", password "randscapetown"';
        } else {
          hint = 'Staff credentials: username "Staff", password "randscapetown"';
        }
        return { success: false, message: `Authentication failed. ${hint}` };
      }
    }

    // Handle form submit
    if (loginForm) {
      loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        
        if (!username) {
          showError('Please enter your username');
          usernameInput.focus();
          return;
        }
        if (!password) {
          showError('Please enter your password');
          passwordInput.focus();
          return;
        }
        
        // Double-check credentials
        const expectedCred = VALID_CREDENTIALS[currentUserType];
        if (!expectedCred) {
          showError('Invalid user role selected.');
          return;
        }
        
        const isUsernameValid = (username === expectedCred.username);
        const isPasswordValid = (password === expectedCred.password);
        
        if (!isUsernameValid) {
          let roleDisplay = currentUserType === 'superadmin' ? 'Super Admin' : (currentUserType === 'admin' ? 'Tenant Admin' : 'Staff');
          showError(`Incorrect username for ${roleDisplay} role. Expected: "${expectedCred.username}"`);
          usernameInput.focus();
          return;
        }
        if (!isPasswordValid) {
          let roleDisplay = currentUserType === 'superadmin' ? 'Super Admin' : (currentUserType === 'admin' ? 'Tenant Admin' : 'Staff');
          showError(`Incorrect password for ${roleDisplay} role.`);
          passwordInput.focus();
          return;
        }
        
        // Show loading state
        loginBtn.classList.add('loading');
        const originalHTML = loginBtn.innerHTML;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Verifying credentials...';
        
        const result = await authenticateAndRedirect(username, password, currentUserType);
        
        if (result.success) {
          // Store session info
          sessionStorage.setItem('rands_user_logged_in', 'true');
          sessionStorage.setItem('rands_user_role', result.role);
          sessionStorage.setItem('rands_user_type', currentUserType);
          sessionStorage.setItem('rands_user_name', result.username);
          sessionStorage.setItem('rands_display_name', result.displayName);
          sessionStorage.setItem('rands_login_time', Date.now().toString());
          
          // Set a flag for role-based dashboard access
          if (currentUserType === 'superadmin') {
            sessionStorage.setItem('is_super_admin', 'true');
            sessionStorage.setItem('is_tenant_admin', 'false');
            sessionStorage.setItem('is_staff', 'false');
          } else if (currentUserType === 'admin') {
            sessionStorage.setItem('is_super_admin', 'false');
            sessionStorage.setItem('is_tenant_admin', 'true');
            sessionStorage.setItem('is_staff', 'false');
          } else {
            sessionStorage.setItem('is_super_admin', 'false');
            sessionStorage.setItem('is_tenant_admin', 'false');
            sessionStorage.setItem('is_staff', 'true');
          }
          
          // Show final green success acknowledgment on button
          loginBtn.innerHTML = '<i class="fas fa-check-circle"></i> Access Granted! Redirecting...';
          
          // Add a global green flash acknowledgment before redirect
          const successAck = document.createElement('div');
          let roleIcon = '';
          if (currentUserType === 'superadmin') roleIcon = '<i class="fas fa-crown"></i>';
          else if (currentUserType === 'admin') roleIcon = '<i class="fas fa-user-tie"></i>';
          else roleIcon = '<i class="fas fa-users"></i>';
          
          successAck.innerHTML = `${roleIcon} Welcome, ${result.displayName}! Redirecting to dashboard...`;
          successAck.style.position = 'fixed';
          successAck.style.bottom = '20px';
          successAck.style.left = '50%';
          successAck.style.transform = 'translateX(-50%)';
          successAck.style.backgroundColor = '#10b981';
          successAck.style.color = 'white';
          successAck.style.padding = '14px 28px';
          successAck.style.borderRadius = '50px';
          successAck.style.fontWeight = 'bold';
          successAck.style.zIndex = '9999';
          successAck.style.boxShadow = '0 10px 25px rgba(0,0,0,0.2)';
          successAck.style.fontFamily = 'Montserrat, sans-serif';
          successAck.style.fontSize = '14px';
          successAck.style.display = 'flex';
          successAck.style.alignItems = 'center';
          successAck.style.gap = '10px';
          document.body.appendChild(successAck);
          
          setTimeout(() => {
            successAck.style.opacity = '0';
            successAck.style.transition = 'opacity 0.5s ease';
            setTimeout(() => successAck.remove(), 500);
          }, 1500);
          
          // Redirect to the appropriate HTML file
          setTimeout(() => {
            window.location.href = result.redirectUrl;
          }, 1000);
        } else {
          loginBtn.classList.remove('loading');
          loginBtn.innerHTML = originalHTML;
          showError(result.message);
          passwordInput.value = '';
          passwordInput.focus();
          passwordWrapper.classList.remove('valid-password');
          passwordSuccessMsg.classList.add('hidden');
        }
      });
    }
    
    // Enter key on password field
    if (passwordInput) {
      passwordInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          loginForm.dispatchEvent(new Event('submit'));
        }
      });
    }
    
    // Set initial hint and active state
    const init = () => {
      // Set Super Admin as default active
      superadminTypeBtn.classList.add('active');
      const hintSpan = document.querySelector('#usernameHint span');
      if (hintSpan) hintSpan.textContent = 'Super Admin: "Superadmin" | Tenant Admin: "Admin" | Staff: "Staff"';
      usernameInput.focus();
    };
    init();
  })();
</script>
</body>
</html>
