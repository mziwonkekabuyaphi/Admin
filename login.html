<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Rands Venue OS | Login Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Montserrat', 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #0a0c0f 0%, #1a1e24 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* Login Container */
  .login-container {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    animation: fadeIn 0.8s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Login Card */
  .login-card {
    background: rgba(255, 255, 255, 0.98);
    backdrop-filter: blur(10px);
    border-radius: 32px;
    padding: 48px 40px;
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(227, 6, 19, 0.1);
    position: relative;
    overflow: hidden;
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: linear-gradient(90deg, #E30613, #ff4d5a, #E30613);
    animation: gradientShift 3s ease infinite;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Logo Area */
  .logo-area {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo-icon {
    width: 80px;
    height: 80px;
    background: #fff;
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
    overflow: hidden;
    transition: transform 0.3s ease;
  }

  .logo-icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .logo-icon:hover {
    transform: rotate(5deg) scale(1.05);
  }

  .logo-area h1 {
    font-size: 32px;
    font-weight: 800;
    color: #222;
    letter-spacing: -0.5px;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .logo-area h1 span {
    color: #E30613;
    font-weight: 900;
    position: relative;
    display: inline-block;
  }

  .logo-area h1 span::after {
    content: '';
    position: absolute;
    bottom: 4px;
    left: 0;
    width: 100%;
    height: 8px;
    background: rgba(227, 6, 19, 0.1);
    border-radius: 4px;
    z-index: -1;
  }

  .logo-area .subtitle {
    color: #888;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* User Type Selector */
  .user-type-selector {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    background: #f5f5f5;
    padding: 6px;
    border-radius: 60px;
  }

  .user-type-btn {
    flex: 1;
    padding: 14px 24px;
    border: none;
    background: transparent;
    border-radius: 60px;
    font-size: 16px;
    font-weight: 600;
    color: #666;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .user-type-btn i {
    font-size: 18px;
  }

  .user-type-btn.active {
    background: white;
    color: #E30613;
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
  }

  .user-type-btn.admin.active {
    background: linear-gradient(135deg, #E30613 0%, #b3000c 100%);
    color: white;
  }

  .user-type-btn.staff.active {
    background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
    color: white;
  }

  /* Form Groups */
  .form-group {
    margin-bottom: 24px;
    position: relative;
  }

  .form-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
    font-weight: 600;
    color: #444;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-wrapper i:first-child {
    position: absolute;
    left: 16px;
    color: #999;
    font-size: 18px;
    transition: color 0.3s ease;
  }

  .input-wrapper input {
    width: 100%;
    padding: 16px 16px 16px 50px;
    border: 2px solid #e0e0e0;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 500;
    transition: all 0.3s ease;
    background: white;
    font-family: inherit;
  }

  .input-wrapper input:focus {
    outline: none;
    border-color: #E30613;
    box-shadow: 0 0 0 4px rgba(227, 6, 19, 0.1);
  }

  .input-wrapper input:focus + i:first-child {
    color: #E30613;
  }

  .toggle-password {
    position: absolute;
    right: 16px;
    left: auto !important;
    cursor: pointer;
    color: #999;
    z-index: 2;
  }

  .toggle-password:hover {
    color: #E30613;
  }

  /* Password Hints */
  .password-hint {
    margin-top: 8px;
    font-size: 12px;
    color: #999;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .password-hint i {
    font-size: 14px;
  }

  .password-hint.admin-hint {
    color: #E30613;
  }

  .password-hint.staff-hint {
    color: #3498db;
  }

  .hidden {
    display: none !important;
  }

  /* Remember & Forgot */
  .remember-forgot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
  }

  .remember {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }

  .remember input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: #E30613;
  }

  .remember span {
    font-size: 14px;
    color: #666;
    font-weight: 500;
  }

  .forgot-link {
    font-size: 14px;
    color: #E30613;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s ease;
  }

  .forgot-link:hover {
    color: #b3000c;
    text-decoration: underline;
  }

  /* Login Button */
  .login-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #E30613 0%, #b3000c 100%);
    border: none;
    border-radius: 60px;
    color: white;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .login-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transition: left 0.5s ease;
  }

  .login-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 30px rgba(227, 6, 19, 0.3);
  }

  .login-btn:hover::before {
    left: 100%;
  }

  .login-btn i {
    font-size: 20px;
    transition: transform 0.3s ease;
  }

  .login-btn:hover i {
    transform: translateX(5px);
  }

  .login-btn.loading {
    pointer-events: none;
    opacity: 0.8;
  }

  .login-btn.loading i {
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Security Note */
  .security-note {
    text-align: center;
    color: #999;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding-top: 16px;
    border-top: 1px solid #eee;
  }

  .security-note i {
    color: #E30613;
  }

  /* Error Message */
  .error-message {
    background: #ffebee;
    border-left: 4px solid #E30613;
    padding: 12px 16px;
    border-radius: 12px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: shake 0.5s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }

  .error-message i {
    color: #E30613;
    font-size: 20px;
  }

  .error-message span {
    color: #c62828;
    font-size: 14px;
    font-weight: 500;
    flex: 1;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .login-card {
      padding: 32px 24px;
    }
    
    .logo-area h1 {
      font-size: 24px;
    }
    
    .user-type-btn {
      padding: 12px 16px;
      font-size: 14px;
    }
    
    .remember-forgot {
      flex-direction: column;
      gap: 12px;
      align-items: flex-start;
    }
  }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="logo-area">
      <div class="logo-icon">
        <img src="images/rands-logo.png" alt="Rands Logo" onerror="this.onerror=null; this.parentElement.innerHTML='<i class=\'fas fa-building\' style=\'font-size:48px; color:#E30613;\'></i>';">
      </div>
      <h1><span>Rands</span> Venue Management OS</h1>
      <div class="subtitle">Enterprise Access Portal</div>
    </div>

    <!-- User Type Selector -->
    <div class="user-type-selector">
      <button class="user-type-btn admin active" id="adminTypeBtn"><i class="fas fa-user-tie"></i> Admin</button>
      <button class="user-type-btn staff" id="staffTypeBtn"><i class="fas fa-users"></i> Staff</button>
    </div>

    <!-- Error Message -->
    <div id="errorMessage" class="error-message hidden">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorText">Invalid username or password</span>
    </div>

    <!-- Login Form -->
    <form id="loginForm">
      <div class="form-group">
        <label><i class="fas fa-user-circle" style="margin-right: 6px;"></i> Username</label>
        <div class="input-wrapper">
          <i class="fas fa-user"></i>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="off">
        </div>
        <div class="password-hint" id="usernameHint">
          <i class="fas fa-info-circle"></i>
          <span>Enter your registered username</span>
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-lock" style="margin-right: 6px;"></i> Password</label>
        <div class="input-wrapper">
          <i class="fas fa-key"></i>
          <input type="password" id="password" placeholder="Enter your password">
          <i class="fas fa-eye toggle-password" id="togglePassword"></i>
        </div>
      </div>

      <div class="remember-forgot">
        <label class="remember">
          <input type="checkbox" id="rememberMe">
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link" id="forgotPasswordLink">Forgot Password?</a>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">
        <span>Access Dashboard</span>
        <i class="fas fa-arrow-right"></i>
      </button>

      <div class="security-note">
        <i class="fas fa-shield-alt"></i>
        <span>Secured by Rands Enterprise Security</span>
      </div>
    </form>
  </div>
</div>

<script>
  (function() {
    // DOM Elements
    const adminTypeBtn = document.getElementById('adminTypeBtn');
    const staffTypeBtn = document.getElementById('staffTypeBtn');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const errorMessageDiv = document.getElementById('errorMessage');
    const errorTextSpan = document.getElementById('errorText');
    const togglePassword = document.getElementById('togglePassword');
    const rememberCheckbox = document.getElementById('rememberMe');
    const forgotLink = document.getElementById('forgotPasswordLink');

    let currentUserType = 'admin';

    // Toggle password visibility
    if (togglePassword) {
      togglePassword.addEventListener('click', function() {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.classList.toggle('fa-eye-slash');
      });
    }

    // Set active user type button
    function setActiveUserType(type) {
      currentUserType = type;
      if (type === 'admin') {
        adminTypeBtn.classList.add('active');
        staffTypeBtn.classList.remove('active');
        adminTypeBtn.classList.add('admin');
      } else {
        staffTypeBtn.classList.add('active');
        adminTypeBtn.classList.remove('active');
      }
    }

    // Admin button click
    if (adminTypeBtn) {
      adminTypeBtn.addEventListener('click', function() {
        setActiveUserType('admin');
        usernameInput.value = '';
        passwordInput.value = '';
        usernameInput.focus();
      });
    }

    // Staff button click
    if (staffTypeBtn) {
      staffTypeBtn.addEventListener('click', function() {
        setActiveUserType('staff');
        usernameInput.value = '';
        passwordInput.value = '';
        usernameInput.focus();
      });
    }

    // Forgot password handler
    if (forgotLink) {
      forgotLink.addEventListener('click', function(e) {
        e.preventDefault();
        alert('Please contact your system administrator to reset your password.');
      });
    }

    // Show error message
    function showError(message) {
      errorTextSpan.textContent = message;
      errorMessageDiv.classList.remove('hidden');
      setTimeout(() => {
        errorMessageDiv.classList.add('hidden');
      }, 4000);
    }

    // Save to localStorage if "Remember me" is checked
    function saveCredentials(username, password, userType) {
      if (rememberCheckbox && rememberCheckbox.checked) {
        localStorage.setItem('rands_remember_username', username);
        localStorage.setItem('rands_remember_password', password);
        localStorage.setItem('rands_remember_type', userType);
        localStorage.setItem('rands_remember_checked', 'true');
      } else {
        localStorage.removeItem('rands_remember_username');
        localStorage.removeItem('rands_remember_password');
        localStorage.removeItem('rands_remember_type');
        localStorage.setItem('rands_remember_checked', 'false');
      }
    }

    // Load saved credentials
    function loadSavedCredentials() {
      const savedChecked = localStorage.getItem('rands_remember_checked');
      if (savedChecked === 'true') {
        const savedUsername = localStorage.getItem('rands_remember_username');
        const savedPassword = localStorage.getItem('rands_remember_password');
        const savedType = localStorage.getItem('rands_remember_type');
        
        if (savedUsername && savedPassword && savedType) {
          usernameInput.value = savedUsername;
          passwordInput.value = savedPassword;
          setActiveUserType(savedType);
          if (rememberCheckbox) rememberCheckbox.checked = true;
        }
      }
    }

    // Validate login - In production, this would call your backend API
    async function validateLogin(username, password, userType) {
      // For production, replace this with your actual authentication API
      // Example:
      // const response = await fetch('/api/login', {
      //   method: 'POST',
      //   headers: { 'Content-Type': 'application/json' },
      //   body: JSON.stringify({ username, password, userType })
      // });
      // return await response.json();
      
      // This is a placeholder - in production, NEVER hardcode credentials
      // You should implement proper backend authentication
      return { success: false, message: 'Authentication failed. Please contact your system administrator.' };
    }

    // Handle login form submission
    if (loginForm) {
      loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();
        
        if (!username) {
          showError('Please enter your username');
          usernameInput.focus();
          return;
        }
        
        if (!password) {
          showError('Please enter your password');
          passwordInput.focus();
          return;
        }
        
        // Show loading state
        loginBtn.classList.add('loading');
        const originalBtnText = loginBtn.innerHTML;
        loginBtn.innerHTML = '<i class="fas fa-spinner"></i> Authenticating...';
        
        // Call validation (connect to your backend)
        const result = await validateLogin(username, password, currentUserType);
        
        if (result.success) {
          // Save credentials if remember me is checked
          saveCredentials(username, password, currentUserType);
          
          // Store session info
          sessionStorage.setItem('rands_user_logged_in', 'true');
          sessionStorage.setItem('rands_user_role', result.role);
          sessionStorage.setItem('rands_user_name', username);
          sessionStorage.setItem('rands_login_time', Date.now().toString());
          
          // Show success feedback
          loginBtn.innerHTML = '<i class="fas fa-check"></i> Success! Redirecting...';
          
          // Redirect based on role
          setTimeout(() => {
            window.location.href = result.redirectUrl;
          }, 800);
        } else {
          // Show error
          loginBtn.classList.remove('loading');
          loginBtn.innerHTML = originalBtnText;
          showError(result.message || 'Invalid username or password');
          passwordInput.value = '';
          passwordInput.focus();
        }
      });
    }
    
    // Handle Enter key on password field
    if (passwordInput) {
      passwordInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          loginForm.dispatchEvent(new Event('submit'));
        }
      });
    }
  })();
</script>
</body>
</html>
